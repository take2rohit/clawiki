title: "Clawiki"
branch: "world_models"
description: "A structured, cross-referenced literature review knowledge base maintained with Claude Code."
theme: jekyll-theme-slate
markdown: kramdown
kramdown:
  input: GFM
exclude:
  - ".claude/"
  - "CLAUDE.md"
  - "Gemfile"
  - "Gemfile.lock"
defaults:
  - scope:
      path: ""
    values:
      layout: default
