title: "Clawiki"
description: "A structured, cross-referenced literature review knowledge base maintained with Claude Code."
remote_theme: pages-themes/hacker@v0.2.0
plugins:
  - jekyll-remote-theme
markdown: kramdown
kramdown:
  input: GFM
exclude:
  - ".claude/"
  - "Gemfile"
  - "Gemfile.lock"
defaults:
  - scope:
      path: ""
    values:
      layout: default
